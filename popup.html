<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meesho Auto Lister</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🚀 Meesho Auto Lister</h1>
        
        <div class="tab-buttons">
            <button class="tab-btn active" data-tab="upload">Upload CSV</button>
            <button class="tab-btn" data-tab="settings">Settings</button>
        </div>

        <div id="upload" class="tab-content active">
            <div class="upload-area" id="uploadArea">
                <p>📁 Drag CSV file here or click to select</p>
                <input type="file" id="csvFile" accept=".csv" hidden>
            </div>
            
            <div id="fileInfo" style="display:none;">
                <p id="fileName"></p>
                <button id="previewBtn" class="btn btn-secondary">Preview Data</button>
                <button id="startBtn" class="btn btn-primary">Start Listing</button>
            </div>

            <div id="preview" style="display:none;">
                <h3>Preview (First 5 rows)</h3>
                <table id="previewTable"></table>
            </div>

            <div id="progress" style="display:none;">
                <h3>Progress</h3>
                <div class="progress-bar">
                    <div id="progressFill"></div>
                </div>
                <p id="progressText">0/0 items</p>
                <div id="logs"></div>
            </div>
        </div>

        <div id="settings" class="tab-content">
            <div class="setting-group">
                <label>Auto-fill delay (ms):</label>
                <input type="number" id="delayInput" min="500" max="5000" value="1000">
            </div>
            <div class="setting-group">
                <label>Max retries:</label>
                <input type="number" id="retriesInput" min="1" max="5" value="3">
            </div>
            <button id="saveSettings" class="btn btn-primary">Save Settings</button>
            <div id="settingMessage"></div>
        </div>
    </div>

    <script src="popup.js"><\/script>
</body>
</html>
